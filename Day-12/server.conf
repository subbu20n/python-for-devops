# Server Configuration File

# Network Settings
PORT = 8080
MAX_CONNECTIONS=600  # here will update when you run the in server and pass arguments then it will update 
TIMEOUT = 30

# Security Settings
SSL_ENABLED = true
SSL_CERT = /path/to/certificate.pem

# Logging Settings
LOG_LEVEL = INFO
LOG_FILE = /var/log/server.log

# Other Settings
ENABLE_FEATURE_X = true